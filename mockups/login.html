<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Athlon — Είσοδος</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --surface-1: #141414;
    --surface-2: #1C1C1C;
    --border: #262626;
    --text-1: #FAFAFA;
    --text-2: #A1A1A1;
    --text-3: #6B6B6B;
    --accent: #C5FF00;
    --accent-glow: rgba(197, 255, 0, 0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #050505;
    color: var(--text-1);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .phone-frame {
    width: 100%;
    max-width: 420px;
    min-height: 880px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 44px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .ambient-glow {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
    filter: blur(80px);
    opacity: 0.55;
    pointer-events: none;
  }
  .ambient-glow-2 {
    position: absolute;
    bottom: -120px;
    right: -100px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(197, 255, 0, 0.2) 0%, transparent 70%);
    filter: blur(70px);
    pointer-events: none;
  }
  .notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #000;
    border-radius: 999px;
    z-index: 10;
  }
  .container {
    padding: 80px 28px 40px;
    display: flex;
    flex-direction: column;
    min-height: 880px;
    position: relative;
    z-index: 1;
  }
  .logo {
    text-align: center;
    margin-top: 24px;
    margin-bottom: 64px;
  }
  .logo-mark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 44px;
    letter-spacing: -0.05em;
    color: var(--text-1);
    display: inline-block;
    line-height: 1;
  }
  .logo-mark .accent-dot {
    color: var(--accent);
    text-shadow: 0 0 24px rgba(197, 255, 0, 0.7);
  }
  .logo-tag {
    margin-top: 10px;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .welcome {
    margin-bottom: 32px;
  }
  .welcome h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin-bottom: 6px;
  }
  .welcome p {
    color: var(--text-2);
    font-size: 14px;
    line-height: 1.5;
  }
  .form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .input-group {
    position: relative;
  }
  .input-group label {
    position: absolute;
    top: 10px;
    left: 18px;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .input-group input {
    width: 100%;
    background: var(--surface-1);
    border: 1px solid var(--border);
    color: var(--text-1);
    padding: 26px 18px 12px;
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 500;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-2);
  }
  .sign-in-btn {
    margin-top: 16px;
    background: var(--accent);
    color: #0A0A0A;
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 32px rgba(197, 255, 0, 0.25);
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .sign-in-btn:hover {
    box-shadow: 0 0 48px rgba(197, 255, 0, 0.5);
  }
  .sign-in-btn:active {
    transform: scale(0.98);
  }
  .forgot {
    text-align: center;
    margin-top: 20px;
    color: var(--text-2);
    font-size: 13px;
    text-decoration: none;
    font-weight: 500;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    color: var(--text-3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .alt-btn {
    width: 100%;
    background: var(--surface-1);
    color: var(--text-1);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: inherit;
  }
  .footer {
    margin-top: auto;
    padding-top: 28px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
  }
  .footer a {
    color: var(--text-1);
    text-decoration: none;
    font-weight: 700;
  }
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--text-1);
    border-radius: 3px;
    opacity: 0.4;
  }
  .caption {
    text-align: center;
    color: var(--text-3);
    font-size: 12px;
    margin-top: 24px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="container">
      <div class="logo">
        <div class="logo-mark">ATHLON<span class="accent-dot">.</span></div>
        <div class="logo-tag">Train · Track · Transform</div>
      </div>

      <div class="welcome">
        <h1>Καλώς ήρθες πίσω</h1>
        <p>Συνέχισε την προπόνησή σου από εκεί που έμεινες</p>
      </div>

      <form class="form" onsubmit="window.location.href='home.html'; return false;">
        <div class="input-group">
          <label>EMAIL</label>
          <input type="email" value="vasilis@athlon.app">
        </div>
        <div class="input-group">
          <label>ΚΩΔΙΚΟΣ</label>
          <input type="password" value="••••••••••">
        </div>
        <button type="submit" class="sign-in-btn">
          Είσοδος
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <a href="#" class="forgot">Ξέχασες τον κωδικό σου;</a>

      <div class="divider">ή</div>

      <button class="alt-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Συνέχεια με Apple
      </button>

      <div class="footer">
        Νέος εδώ; <a href="#">Ξεκίνα δωρεάν δοκιμή</a>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>
<div class="caption">Athlon — Login Screen · Mobile (iPhone)</div>
</body>
</html>
